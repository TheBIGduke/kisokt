<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Page Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette</title>

    <!-- Styling for layout, animations, wheel design, buttons, and result display -->
    <style>
        /* Reset default browser styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body background and centering */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 25%, #1a1410 50%, #0a0a0a 75%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Decorative radial light background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(139, 101, 8, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(139, 101, 8, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Centered container for all elements */
        .container {
            text-align: center;
            padding: 20px;
            animation: fadeIn 1s ease;
            max-width: 100%;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Page Title Style */
        h1 {
            color: transparent;
            background: linear-gradient(135deg, #8b6508, #b8860b, #8b6508, #6b5208);
            background-clip: text;
            -webkit-background-clip: text;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(139, 101, 8, 0.3);
            font-weight: bold;
            letter-spacing: 3px;
        }

        /* Subtitle (optional) */
        .subtitle {
            color: #8b6508;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-style: italic;
            opacity: 0.8;
        }

        /* Container for the roulette wheel */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 500px;
            margin: 0 auto;
        }

        /* Outer decorative gold ring */
        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b6508, #5a4005, #8b6508, #5a4005);
            padding: 15px;
            box-shadow:
                0 0 50px rgba(139, 101, 8, 0.2),
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 10px 40px rgba(0, 0, 0, 0.8);
        }

        /* Middle segmentB ring */
        .middle-ring {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border-radius: 50%;
            background: #1a1410;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9);
        }

        /* Wheel container where SVG is injected */
        .wheel {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow:
                inset 0 0 0 2px #8b6508,
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            background: #2a2a2a;
        }

        /* Inner segments (unused since using SVG) */
        .wheel-segment {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 50%;
            transform-origin: 0% 100%;
            overflow: hidden;
        }

        .segment-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
        }

        /* Red segment styling */
        .segment-red .segment-inner {
            background: linear-gradient(45deg, #8B0000, #DC143C, #8B0000);
        }

        /* segmentB segment styling */
        .segment-segmentB .segment-inner {
            background: linear-gradient(45deg, #000000, #2a2a2a, #000000);
        }

        /* Center circle (button to spin the wheel) */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #8b6508, #8b6508);
            border-radius: 50%;
            z-index: 10;
            box-shadow:
                0 0 30px rgba(155, 116, 17, 0.4),
                0 5px 15px rgba(68, 54, 11, 0.7),
                inset 0 -3px 5px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
            border: 3px solid #2a2015;
        }

        .center-circle:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .center-circle::before {
            content: 'GIRA';
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Arrow/pointer indicating the top of the wheel */
        .pointer {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #8b6508;
            z-index: 11;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.7));
            animation: pulse 1s ease-in-out infinite;
        }

        .pointer::after {
            content: '';
            position: absolute;
            left: -10px;
            top: -35px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid #5a4005;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.05);
            }
        }

        /* Result box below the wheel */
        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(139, 101, 8, 0.1), rgba(0, 0, 0, 0.5));
            border-radius: 10px;
            border: 1px solid #8b6508;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .result::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(139, 101, 8, 0.1), transparent);
            animation: slide 3s linear infinite;
        }

        @keyframes slide {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .result-text {
            color: #b8860b;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(139, 101, 8, 0.3);
            position: relative;
            z-index: 1;
        }

        /* Result pulse animation on win */
        .win-animation {
            animation: winPulse 1s ease-in-out;
        }

        @keyframes winPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        /* Animated gold border */
        .decorative-border {
            position: absolute;
            inset: -20px;
            border: 2px solid transparent;
            border-image: linear-gradient(45deg, #8b6508, transparent, #8b6508) 1;
            border-radius: 50%;
            animation: rotate 20s linear infinite;
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Logo -->
        <img id="logo-img" src="" alt="Logo" style="width:300px; height:auto; display:none;">
        <h1>...</h1>
        <div style="height: 75px;"></div>

        <!-- Roulette Wheel -->
        <div class="roulette-wrapper">
            <div class="decorative-border"></div>
            <div class="pointer"></div>
            <div class="outer-ring">
                <div class="middle-ring">
                    <div class="wheel" id="wheel-svg-container"></div>
                    <div class="center-circle" onclick="spin()"></div>
                </div>
            </div>
        </div>

        <!-- Prize result display -->
        <div class="result">
            <div class="result-text" id="result">...</div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        let prizes = [];
        let config = {};

        // Initialize Native WebSocket
        const socket = new WebSocket('ws://localhost:5000');

        socket.onopen = () => {
            console.log('Connected to server via Native WebSocket');
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log('Received Message:', data);
            if (data.type === 'print_status') {
                console.log('Print Status:', data.status, data.message);
            }
        };

        socket.onclose = () => {
            console.log('Disconnected from server');
        };

        socket.onerror = (error) => {
            console.error('WebSocket Error:', error);
        };

        // Audio Element
        const spinAudio = new Audio();
        spinAudio.loop = true;

        // Load Configuration
        function loadConfig() {
            try {
                if (!window.GAME_CONFIG) {
                    throw new Error("GAME_CONFIG not found in config.js");
                }
                config = window.GAME_CONFIG;

                // Apply UI Settings
                // Apply UI Settings
                document.title = config.ui.title || "Premium Roulette";
                const logoImg = document.getElementById('logo-img');
                if (logoImg && config.ui.logo) {
                    logoImg.src = config.ui.logo;
                    logoImg.style.width = config.ui.logo_width || "300px";
                    logoImg.style.display = "inline-block";
                }
                const titleH1 = document.querySelector('h1');
                if (titleH1 && config.ui.title) {
                    titleH1.textContent = config.ui.title;
                }

                // Apply Start Text
                const resultDiv = document.getElementById('result');
                if (resultDiv && config.ui.start_text) {
                    resultDiv.textContent = config.ui.start_text;
                }

                // Preload Audio
                if (config.audio && config.audio.spin_sound) {
                    spinAudio.src = config.audio.spin_sound;
                }

                // Process Prizes
                if (config.prizes) {
                    prizes = config.prizes.map(p => ({
                        number: p.number,
                        color: p.color,
                        prize: p.label,
                        weight: p.weight
                    }));
                }

                // Initialize Wheel
                createWheel();
            } catch (e) {
                console.error("Error loading configuration:", e);
                document.body.innerHTML = "<h1 style='color:white;text-align:center'>Error loading configuration. Check console.</h1>";
            }
        }

        let isSpinning = false; // Prevent double clicks
        let currentRotation = 0; // Track total rotation to prevent resetting

        // Utility: weighted random index selector
        function getWeightedRandomIndex(items) {
            const totalWeight = items.reduce((acc, item) => acc + item.weight, 0);
            let random = Math.random() * totalWeight;
            for (let i = 0; i < items.length; i++) {
                random -= items[i].weight;
                if (random <= 0) return i;
            }
            return items.length - 1; // fallback
        }

        // Draw the wheel with SVG
        function createWheel() {
            if (prizes.length === 0) return;

            const size = 420;
            const radius = size / 2;
            const segmentAngle = 360 / prizes.length;
            const wheel = document.getElementById('wheel-svg-container');
            let svg = `<svg id="wheel-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius:50%;overflow:visible;">`;

            // Colors from config or defaults
            const segmentA = config.wheel?.colors?.segmentA || '#DC143C';
            const segmentB = config.wheel?.colors?.segmentB || '#222';
            const colorStroke = config.wheel?.colors?.stroke || '#8b6508';
            const colorText = config.wheel?.colors?.text || '#ffffff';

            prizes.forEach((prize, i) => {
                const startAngle = i * segmentAngle - 90;
                const endAngle = startAngle + segmentAngle;

                const x1 = radius + radius * Math.cos(Math.PI * startAngle / 180);
                const y1 = radius + radius * Math.sin(Math.PI * startAngle / 180);
                const x2 = radius + radius * Math.cos(Math.PI * endAngle / 180);
                const y2 = radius + radius * Math.sin(Math.PI * endAngle / 180);

                const largeArc = segmentAngle > 180 ? 1 : 0;

                // Determine color based on config key or default logic
                let segmentColor = segmentB;
                if (prize.color === 'segmentA') segmentColor = segmentA;
                if (prize.color === 'segmentB') segmentColor = segmentB;
                if (prize.color === 'red') segmentColor = segmentA; // Fallback
                if (prize.color === 'black') segmentColor = segmentB; // Fallback

                svg += `
                    <path d="M${radius},${radius} L${x1},${y1} A${radius},${radius} 0 ${largeArc},1 ${x2},${y2} Z"
                        fill="${segmentColor}" stroke="${colorStroke}" stroke-width="4"/>
                `;

                const textAngle = startAngle + segmentAngle / 2;
                const textRadius = radius * 0.65;
                const tx = radius + textRadius * Math.cos(Math.PI * textAngle / 180);
                const ty = radius + textRadius * Math.sin(Math.PI * textAngle / 180);

                svg += `
                    <text x="${tx}" y="${ty}" text-anchor="middle" alignment-baseline="middle"
                        fill="${colorText}" font-size="${config.wheel?.text_size || 18}" font-family="Georgia" transform="rotate(${textAngle},${tx},${ty})">
                        ${prize.prize}
                    </text>
                `;
            });

            svg += '</svg>';
            wheel.innerHTML = svg;
        }

        // Start loading
        loadConfig();

        // Spin logic
        function spin() {
            if (isSpinning || prizes.length === 0) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel-svg-container');
            const segmentCount = prizes.length;
            const segmentAngle = 360 / segmentCount;
            const randomIndex = getWeightedRandomIndex(prizes);

            // Calculate target alignment
            const offset = randomIndex * segmentAngle + segmentAngle / 2;
            const extraSpins = config.wheel?.extra_spins || 5;
            const minSpinInfo = 360 * extraSpins;

            // Calculate next target rotation that respects the offset
            const k = Math.ceil((currentRotation + minSpinInfo + offset) / 360);
            const finalAngle = k * 360 - offset;

            currentRotation = finalAngle;

            // Apply dramatic spin without resetting
            const duration = config.wheel?.spin_duration_seconds || 5;
            wheel.style.transition = `transform ${duration}s cubic-bezier(0.15, 0.55, 0.25, 1)`;
            wheel.style.transform = `rotate(${finalAngle}deg)`;

            // Start Audio
            if (config.audio && config.audio.spin_sound) {
                spinAudio.currentTime = 0;
                spinAudio.play().catch(e => console.log("Audio play blocked:", e));
            }

            // Display prize after spin
            setTimeout(() => {
                // Stop Audio
                spinAudio.pause();

                const wonPrize = prizes[randomIndex].prize;
                const resultText = document.getElementById('result');
                resultText.textContent = `¡Ganaste: ${wonPrize}!`;
                resultText.classList.add('win-animation');

                setTimeout(() => {
                    resultText.textContent = config.ui.start_text || '...';
                }, 2000);

                // Trigger print
                const wonPrizeNumber = prizes[randomIndex].number;
                console.log("Sending print request for prize #:", wonPrizeNumber);
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        command: 'print_ticket',
                        number: wonPrizeNumber
                    }));
                } else {
                    console.error("WebSocket is not open. Cannot print.");
                }

                setTimeout(() => {
                    resultText.classList.remove('win-animation');
                    isSpinning = false;
                }, 1000);
            }, duration * 1000); // match animation duration
        }
    </script>
</body>

</html>
